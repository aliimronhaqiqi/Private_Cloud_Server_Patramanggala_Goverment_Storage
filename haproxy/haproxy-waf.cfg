global
	log /dev/log	local0
	log /dev/log	local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

	# Default SSL material locations
	ca-base /etc/ssl/certs
	crt-base /etc/ssl/private

	# See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
        ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
        ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
	log	global
	mode	http
	option	httplog
	option	dontlognull
        timeout connect 5000
        timeout client  50000
        timeout server  50000
	errorfile 400 /etc/haproxy/errors/400.http
	errorfile 403 /etc/haproxy/errors/403.http
	errorfile 408 /etc/haproxy/errors/408.http
	errorfile 500 /etc/haproxy/errors/500.http
	errorfile 502 /etc/haproxy/errors/502.http
	errorfile 503 /etc/haproxy/errors/503.http
	errorfile 504 /etc/haproxy/errors/504.http

frontend nextcloud_https
    bind *:443 ssl crt /etc/ssl/private/nextcloud.pem

    option forwardfor

    #############################################
    # Native WAF - Safe Layer
    #############################################

    # Block dangerous HTTP methods
    acl waf_trace method TRACE
    acl waf_connect method CONNECT

    # Block access to hidden files
    acl waf_hidden path_beg /.git /.env /.svn /.hg

    # Block backup directory
    acl waf_sensitive path_beg /backup

    # Block common scanners
    acl waf_scanner hdr_sub(User-Agent) sqlmap
    acl waf_scanner hdr_sub(User-Agent) nikto
    acl waf_scanner hdr_sub(User-Agent) gobuster
    acl waf_scanner hdr_sub(User-Agent) dirbuster
    acl waf_scanner hdr_sub(User-Agent) masscan
    acl waf_scanner hdr_sub(User-Agent) nmap
    acl waf_scanner hdr_sub(User-Agent) wpscan

    http-request capture req.hdr(User-Agent) len 128
    http-request capture req.hdr(Host) len 64

    http-request deny deny_status 403 if waf_trace
    http-request deny deny_status 403 if waf_connect
    http-request deny deny_status 403 if waf_hidden
    http-request deny deny_status 403 if waf_sensitive
    http-request deny deny_status 403 if waf_scanner

    #############################################
    # Rate Limiting
    #############################################

    stick-table type ip size 100k expire 10m store http_req_rate(10s)

    http-request track-sc0 src

    acl waf_abuse sc_http_req_rate(0) gt 222

    http-request deny deny_status 429 if waf_abuse

    #############################################
    # Forward Headers
    #############################################

    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Port 443
    http-request set-header Host %[req.hdr(Host)]

    #############################################
    # Security Response Headers
    #############################################

    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"
    http-response set-header X-Frame-Options "SAMEORIGIN"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    http-response set-header Permissions-Policy "camera=(), microphone=(), geolocation=()"


    default_backend nextcloud


backend nextcloud
    balance roundrobin

    server nextcloud1 127.0.0.0:8080
